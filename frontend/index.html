<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VPN Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── Themes ── */
:root {
  --bg:#0a0c10;--bg2:#111520;--bg3:#181d2a;
  --border:#1e2535;--border2:#2a3348;
  --text:#c8d0e0;--muted:#5a6480;
  --accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --mono:'IBM Plex Mono',monospace;--sans:'Space Grotesk',sans-serif;
  --grid-color:rgba(59,130,246,0.03);
}
[data-theme="light"]{
  --bg:#f4f6fa;--bg2:#ffffff;--bg3:#eef1f7;
  --border:#dde2ed;--border2:#c8d0e4;
  --text:#1e2535;--muted:#7a8499;
  --accent:#2563eb;--accent2:#3b82f6;
  --green:#16a34a;--yellow:#ca8a04;--red:#dc2626;
  --grid-color:rgba(37,99,235,0.04);
}
[data-theme="terminal"]{
  --bg:#0d1117;--bg2:#0d1117;--bg3:#161b22;
  --border:#21262d;--border2:#30363d;
  --text:#00ff41;--muted:#3fb950;
  --accent:#00ff41;--accent2:#7ee787;
  --green:#00ff41;--yellow:#f0e040;--red:#ff4040;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Mono',monospace;
  --grid-color:rgba(0,255,65,0.03);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;width:100%;max-width:920px;padding:36px 24px 80px;}

/* header */
header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.header-left{}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:5px;}
.logo-icon{width:34px;height:34px;border:1.5px solid var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
h1{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent);}
.tagline{font-family:var(--mono);font-size:11px;color:var(--muted);}

/* theme switcher */
.theme-switcher{display:flex;gap:6px;align-items:center;}
.theme-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .2s;}
.theme-btn.active,.theme-btn:hover{border-color:var(--accent);color:var(--accent);}

/* tabs */
.tabs{display:flex;gap:3px;margin-bottom:24px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:12px;padding:4px;width:fit-content;}
.tab{font-family:var(--mono);font-size:12px;padding:7px 16px;border-radius:8px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .2s;}
.tab.active{background:var(--accent);color:#fff;}
.tab:hover:not(.active){color:var(--text);}

.panel{display:none;}
.panel.active{display:block;}

/* input */
.input-row{display:flex;gap:10px;margin-bottom:16px;}
.ip-input{flex:1;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:13px 18px;font-family:var(--mono);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;}
.ip-input::placeholder{color:var(--muted);}
.ip-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.lookup-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 26px;font-family:var(--mono);font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;white-space:nowrap;}
.lookup-btn:hover{background:var(--accent2);}
.lookup-btn:active{transform:scale(.97);}
.lookup-btn:disabled{opacity:.5;cursor:not-allowed;}

.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
.examples span{font-family:var(--mono);font-size:11px;color:var(--muted);}
.chip{font-family:var(--mono);font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--accent2);cursor:pointer;transition:border-color .15s,color .15s;}
.chip:hover{border-color:var(--accent);color:var(--text);}

/* card */
.card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:16px;overflow:hidden;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* verdict banner */
.verdict-banner{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);gap:16px;flex-wrap:wrap;}
.verdict-banner.high{background:rgba(239,68,68,0.08);}
.verdict-banner.medium{background:rgba(234,179,8,0.07);}
.verdict-banner.low{background:rgba(34,197,94,0.07);}
.verdict-left{display:flex;align-items:center;gap:14px;}
.verdict-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.high .verdict-dot{background:var(--red);box-shadow:0 0 8px var(--red);}
.medium .verdict-dot{background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
.low .verdict-dot{background:var(--green);box-shadow:0 0 8px var(--green);}
.verdict-text{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text);}
.verdict-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
.score-pill{font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;border:1.5px solid;white-space:nowrap;}
.high .score-pill{color:var(--red);border-color:var(--red);background:rgba(239,68,68,0.1);}
.medium .score-pill{color:var(--yellow);border-color:var(--yellow);background:rgba(234,179,8,0.1);}
.low .score-pill{color:var(--green);border-color:var(--green);background:rgba(34,197,94,0.1);}

/* provider row */
.provider-row{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.provider-logo{width:28px;height:28px;border-radius:6px;object-fit:contain;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;}
.provider-logo-placeholder{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.provider-name{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);text-decoration:none;}
.provider-name:hover{color:var(--accent);}
.provider-type-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;}
.badge-vpn{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.badge-cloud{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);}
.badge-datacenter{background:rgba(234,179,8,0.12);color:#fbbf24;border:1px solid rgba(234,179,8,0.3);}
.badge-cdn{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3);}
.badge-tor{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.4);}
.badge-isp{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.provider-link{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;text-decoration:none;border:1px solid var(--border2);padding:3px 9px;border-radius:6px;transition:border-color .15s,color .15s;}
.provider-link:hover{border-color:var(--accent);color:var(--accent);}

/* score bar */
.score-bar-wrap{padding:14px 22px;border-bottom:1px solid var(--border);}
.score-bar-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
.score-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.high .score-bar-fill{background:var(--red);}
.medium .score-bar-fill{background:var(--yellow);}
.low .score-bar-fill{background:var(--green);}

/* info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.info-cell{padding:15px 22px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.info-cell:nth-child(even){border-right:none;}
.info-cell:nth-last-child(-n+2){border-bottom:none;}
.cell-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;}
.cell-value{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500;word-break:break-all;}
.cell-value.dim{color:var(--muted);font-style:italic;}

/* flags */
.flags-row{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.flags-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-right:4px;}
.flag-tag{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;}
.flag-tag.vpn{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.flag-tag.dc{background:rgba(234,179,8,0.12);color:#fbbf24;border:1px solid rgba(234,179,8,0.3);}
.flag-tag.clean{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.flag-tag.neutral{background:rgba(90,100,128,0.2);color:var(--muted);border:1px solid var(--border2);}

/* source row */
.source-row{padding:10px 22px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.source-badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:5px;color:var(--muted);border:1px solid var(--border2);}
.source-badge.active{color:var(--accent2);border-color:rgba(59,130,246,0.35);}

/* map */
#map{height:320px;border-radius:12px;margin-top:16px;border:1.5px solid var(--border2);overflow:hidden;}
.leaflet-container{background:var(--bg2);}

/* bulk */
.bulk-textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:14px 18px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:130px;transition:border-color .2s;}
.bulk-textarea::placeholder{color:var(--muted);}
.bulk-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.bulk-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:12px;font-weight:600;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:transparent;color:var(--accent2);border:1.5px solid var(--border2);}
.btn-outline:hover{border-color:var(--accent);color:var(--text);}
.btn-outline:disabled{opacity:.5;cursor:not-allowed;}
.btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1.5px solid rgba(34,197,94,0.3);}
.btn-green:hover{background:rgba(34,197,94,0.25);}
.btn-green:disabled{opacity:.4;cursor:not-allowed;}
.progress-bar-wrap{margin-top:14px;display:none;}
.progress-bar-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease;}
.progress-label{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;}

/* table */
.table-wrap{margin-top:20px;overflow-x:auto;border-radius:12px;border:1.5px solid var(--border2);}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
thead tr{background:var(--bg3);}
th{padding:11px 13px;text-align:left;color:var(--muted);font-size:10px;letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--border2);white-space:nowrap;}
td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,0.04);}
.tbadge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;}
.tbadge.high{background:rgba(239,68,68,0.15);color:#f87171;}
.tbadge.medium{background:rgba(234,179,8,0.12);color:#fbbf24;}
.tbadge.low{background:rgba(34,197,94,0.12);color:#4ade80;}

/* history */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.history-title{font-family:var(--mono);font-size:14px;color:var(--text);font-weight:600;}
.history-empty{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:center;padding:48px 0;}

/* map panel */
#map-panel-map{height:420px;border-radius:12px;border:1.5px solid var(--border2);overflow:hidden;}
.map-info{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px;}

/* loading/error */
.loading{text-align:center;padding:40px;font-family:var(--mono);color:var(--muted);font-size:13px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.25);border-radius:12px;padding:18px 22px;font-family:var(--mono);font-size:13px;color:#f87171;}

@media(max-width:520px){
  .info-grid{grid-template-columns:1fr;}
  .info-cell{border-right:none!important;}
  .info-cell:nth-last-child(-n+2){border-bottom:1px solid var(--border);}
  .info-cell:last-child{border-bottom:none;}
}
</style>
</head>
<body data-theme="dark">
<div class="wrap">

  <header>
    <div class="header-left">
      <div class="logo-row">
        <div class="logo-icon">&#128269;</div>
        <h1>vpn_detector</h1>
      </div>
      <div class="tagline">// ip intelligence &middot; vpn detection &middot; provider lookup</div>
    </div>
    <div class="theme-switcher">
      <button class="theme-btn active" onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn" onclick="setTheme('light')">Light</button>
      <button class="theme-btn" onclick="setTheme('terminal')">Terminal</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('single')">Single Lookup</button>
    <button class="tab" onclick="switchTab('bulk')">Bulk Lookup</button>
    <button class="tab" onclick="switchTab('map')">Map View</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- SINGLE -->
  <div class="panel active" id="panel-single">
    <div class="input-row">
      <input class="ip-input" id="ipInput" type="text" placeholder="Enter IP address  e.g. 185.220.101.1" autocomplete="off" spellcheck="false"/>
      <button class="lookup-btn" id="lookupBtn" onclick="singleLookup()">Lookup &rarr;</button>
    </div>
    <div class="examples">
      <span>try:</span>
      <span class="chip" onclick="tryIp('185.220.101.1')">185.220.101.1</span>
      <span class="chip" onclick="tryIp('104.28.0.1')">104.28.0.1</span>
      <span class="chip" onclick="tryIp('8.8.8.8')">8.8.8.8</span>
      <span class="chip" onclick="tryIp('1.1.1.1')">1.1.1.1</span>
      <span class="chip" onclick="tryMyIp()">my IP</span>
    </div>
    <div id="single-result"></div>
    <div id="map" style="display:none"></div>
  </div>

  <!-- BULK -->
  <div class="panel" id="panel-bulk">
    <textarea class="bulk-textarea" id="bulkInput" placeholder="Paste IPs here, one per line or comma-separated&#10;&#10;185.220.101.1&#10;8.8.8.8&#10;1.1.1.1"></textarea>
    <div class="bulk-actions">
      <button class="btn btn-primary" id="bulkBtn" onclick="bulkLookup()">Run Bulk Lookup</button>
      <button class="btn btn-green" id="exportBtn" onclick="exportCSV()" disabled>Export CSV</button>
      <button class="btn btn-outline" onclick="clearBulk()">Clear</button>
    </div>
    <div class="progress-bar-wrap" id="bulkProgress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">Processing...</div>
    </div>
    <div id="bulk-result"></div>
  </div>

  <!-- MAP -->
  <div class="panel" id="panel-map">
    <div class="input-row">
      <input class="ip-input" id="mapIpInput" type="text" placeholder="Enter IP to pin on map  e.g. 8.8.8.8" autocomplete="off" spellcheck="false"/>
      <button class="lookup-btn" onclick="mapLookup()">Add Pin &rarr;</button>
    </div>
    <div id="map-panel-map"></div>
    <div class="map-info" id="map-info">Enter an IP above to plot it on the map. You can add multiple IPs.</div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="history-header">
      <span class="history-title">Lookup History</span>
      <button class="btn btn-outline" onclick="clearHistory()" style="padding:6px 13px;font-size:11px;">Clear All</button>
    </div>
    <div id="history-content"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = '';
let bulkResults = [];
let history = JSON.parse(localStorage.getItem('vpn_history2') || '[]');
let singleMap = null, panelMap = null;
let panelMarkers = [];

// ── Theme ──────────────────────────────────────────────────────────────────
function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.theme-btn').forEach(b => { if(b.textContent.toLowerCase()===t) b.classList.add('active'); });
  localStorage.setItem('vpn_theme', t);
}
const savedTheme = localStorage.getItem('vpn_theme');
if(savedTheme) setTheme(savedTheme);

// ── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(name) {
  const names = ['single','bulk','map','history'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='history') renderHistory();
  if(name==='map' && !panelMap) initPanelMap();
}

// ── Provider info helpers ──────────────────────────────────────────────────
function providerBadgeClass(type) {
  if(!type) return '';
  const t = type.toLowerCase();
  if(t.includes('vpn')) return 'badge-vpn';
  if(t.includes('tor')) return 'badge-tor';
  if(t.includes('cloud')) return 'badge-cloud';
  if(t.includes('datacenter')) return 'badge-datacenter';
  if(t.includes('cdn')) return 'badge-cdn';
  return 'badge-isp';
}

function buildProviderRow(d) {
  const p = d.provider || {};
  const name = d.org_clean || d.org || 'Unknown';
  const type = p.type;
  const site = p.website;
  const logo = p.logo;

  const logoHtml = logo
    ? `<img class="provider-logo" src="${logo}" alt="" onerror="this.style.display='none'">`
    : `<div class="provider-logo-placeholder">&#127760;</div>`;

  const nameHtml = site
    ? `<a class="provider-name" href="${site}" target="_blank" rel="noopener">${name}</a>`
    : `<span class="provider-name">${name}</span>`;

  const badgeHtml = type
    ? `<span class="provider-type-badge ${providerBadgeClass(type)}">${type}</span>`
    : '';

  const linkHtml = site
    ? `<a class="provider-link" href="${site}" target="_blank" rel="noopener">&#8599; visit</a>`
    : '';

  return `<div class="provider-row">${logoHtml}${nameHtml}${badgeHtml}${linkHtml}</div>`;
}

// ── Card builder ───────────────────────────────────────────────────────────
function buildCard(d) {
  const det = d.detection || {};
  const level = det.level || 'low';
  const score = det.score || 0;
  const flags = det.flags || [];
  const flagHtml = flags.length
    ? flags.map(f => {
        let cls = 'neutral';
        if(['vpn_flag','known_vpn_provider','proxy'].includes(f)) cls = 'vpn';
        if(['datacenter','hosting'].includes(f)) cls = 'dc';
        return `<span class="flag-tag ${cls}">${f.replace(/_/g,' ')}</span>`;
      }).join('')
    : '<span class="flag-tag clean">clean</span>';
  const val = (v) => v || `<span class="dim">&mdash;</span>`;

  return `<div class="card ${level}">
    <div class="verdict-banner ${level}">
      <div class="verdict-left">
        <div class="verdict-dot"></div>
        <div>
          <div class="verdict-text">${det.verdict}</div>
          <div class="verdict-sub">${d.ip} &middot; AS${d.asn||'?'}</div>
        </div>
      </div>
      <div class="score-pill">Risk ${score}/100</div>
    </div>
    ${buildProviderRow(d)}
    <div class="score-bar-wrap ${level}">
      <div class="score-bar-label">VPN Confidence Score</div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${score}%"></div></div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="cell-label">IP Address</div><div class="cell-value">${d.ip}</div></div>
      <div class="info-cell"><div class="cell-label">ASN</div><div class="cell-value">${val(d.asn)}</div></div>
      <div class="info-cell"><div class="cell-label">ISP</div><div class="cell-value">${val(d.isp)}</div></div>
      <div class="info-cell"><div class="cell-label">Country</div><div class="cell-value">${d.country_code?d.country_code+' &middot; ':''}${val(d.country)}</div></div>
      <div class="info-cell"><div class="cell-label">City</div><div class="cell-value">${val(d.city)}</div></div>
      <div class="info-cell"><div class="cell-label">Timezone</div><div class="cell-value">${val(d.timezone)}</div></div>
      <div class="info-cell"><div class="cell-label">Coordinates</div><div class="cell-value">${d.latitude?d.latitude.toFixed(4)+', '+d.longitude.toFixed(4):'<span class="dim">&mdash;</span>'}</div></div>
      <div class="info-cell"><div class="cell-label">Raw Org</div><div class="cell-value" style="font-size:11px;opacity:.7">${val(d.org)}</div></div>
    </div>
    <div class="flags-row"><span class="flags-label">Signals</span>${flagHtml}</div>
    <div class="source-row">
      <span class="source-badge ${d.mmdb_available?'active':''}">
        ${d.mmdb_available?'&#10003;':'&#10007;'} MaxMind MMDB
      </span>
      <span class="source-badge ${d.raw_ip_api&&d.raw_ip_api.status==='success'?'active':''}">
        ${d.raw_ip_api&&d.raw_ip_api.status==='success'?'&#10003;':'&#10007;'} ip-api.com
      </span>
    </div>
  </div>`;
}

// ── Single lookup ──────────────────────────────────────────────────────────
async function singleLookup(ipOverride) {
  const ip = ipOverride || document.getElementById('ipInput').value.trim();
  if(!ip) return;
  const resultEl = document.getElementById('single-result');
  const mapEl = document.getElementById('map');
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  mapEl.style.display = 'none';
  resultEl.innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div><br/>looking up ${ip}...</div></div>`;
  try {
    const res = await fetch(`${API}/api/lookup/${encodeURIComponent(ip)}`);
    if(!res.ok){const e=await res.json();throw new Error(e.detail||'Lookup failed');}
    const data = await res.json();
    resultEl.innerHTML = buildCard(data);
    addToHistory(data);
    if(data.latitude && data.longitude) {
      mapEl.style.display = 'block';
      showSingleMap(data);
    }
  } catch(e) {
    resultEl.innerHTML = `<div class="error-box">&#9888; ${e.message}</div>`;
  } finally { btn.disabled = false; }
}

function tryIp(ip) { document.getElementById('ipInput').value = ip; singleLookup(ip); }
async function tryMyIp() {
  try { const r=await fetch('https://api.ipify.org?format=json'); const {ip}=await r.json(); tryIp(ip); }
  catch { alert('Could not detect your IP'); }
}
document.getElementById('ipInput').addEventListener('keydown', e => { if(e.key==='Enter') singleLookup(); });
document.getElementById('mapIpInput').addEventListener('keydown', e => { if(e.key==='Enter') mapLookup(); });

// ── Single map ─────────────────────────────────────────────────────────────
function showSingleMap(data) {
  const mapEl = document.getElementById('map');
  if(singleMap) { singleMap.remove(); singleMap = null; }
  singleMap = L.map('map', {zoomControl:true}).setView([data.latitude, data.longitude], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(singleMap);
  const color = data.detection.level==='high'?'#ef4444':data.detection.level==='medium'?'#eab308':'#22c55e';
  const icon = L.divIcon({
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 8px ${color}"></div>`,
    iconSize:[14,14], iconAnchor:[7,7], className:''
  });
  L.marker([data.latitude, data.longitude], {icon}).addTo(singleMap)
    .bindPopup(`<b>${data.ip}</b><br>${data.org_clean||data.org}<br>${data.detection.verdict}`).openPopup();
}

// ── Panel map ──────────────────────────────────────────────────────────────
function initPanelMap() {
  panelMap = L.map('map-panel-map', {zoomControl:true}).setView([20,0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(panelMap);
}

async function mapLookup() {
  const ip = document.getElementById('mapIpInput').value.trim();
  if(!ip) return;
  const infoEl = document.getElementById('map-info');
  infoEl.textContent = `Looking up ${ip}...`;
  try {
    const res = await fetch(`${API}/api/lookup/${encodeURIComponent(ip)}`);
    if(!res.ok) throw new Error('Lookup failed');
    const data = await res.json();
    if(!data.latitude||!data.longitude){ infoEl.textContent='No coordinates found for this IP.'; return; }
    if(!panelMap) initPanelMap();
    const color = data.detection.level==='high'?'#ef4444':data.detection.level==='medium'?'#eab308':'#22c55e';
    const icon = L.divIcon({
      html:`<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 7px ${color}"></div>`,
      iconSize:[13,13], iconAnchor:[6,6], className:''
    });
    const marker = L.marker([data.latitude, data.longitude], {icon}).addTo(panelMap)
      .bindPopup(`<b>${data.ip}</b><br>${data.org_clean||data.org}<br>${data.city||''}, ${data.country||''}<br><b>${data.detection.verdict}</b> (${data.detection.score}/100)`)
      .openPopup();
    panelMarkers.push(marker);
    panelMap.setView([data.latitude, data.longitude], 6);
    infoEl.textContent = `Pinned: ${data.ip} &mdash; ${data.org_clean||data.org} &mdash; ${data.detection.verdict}`;
    addToHistory(data);
    document.getElementById('mapIpInput').value = '';
  } catch(e) { infoEl.textContent = 'Error: ' + e.message; }
}

// ── Bulk lookup ────────────────────────────────────────────────────────────
async function bulkLookup() {
  const raw = document.getElementById('bulkInput').value.trim();
  if(!raw) return;
  const ips = raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
  if(!ips.length) return;
  if(ips.length>100){ alert('Maximum 100 IPs per request'); return; }
  const btn=document.getElementById('bulkBtn');
  const expBtn=document.getElementById('exportBtn');
  const progress=document.getElementById('bulkProgress');
  const fill=document.getElementById('progressFill');
  const label=document.getElementById('progressLabel');
  const resultEl=document.getElementById('bulk-result');
  btn.disabled=true; expBtn.disabled=true;
  progress.style.display='block'; fill.style.width='0%';
  label.textContent=`Processing 0 / ${ips.length}...`;
  resultEl.innerHTML=''; bulkResults=[];
  for(let i=0;i<ips.length;i++){
    try{
      const res=await fetch(`${API}/api/lookup/${encodeURIComponent(ips[i])}`);
      const data=await res.json();
      bulkResults.push(data); addToHistory(data);
    } catch{ bulkResults.push({ip:ips[i],error:'Failed',detection:{verdict:'Error',level:'low',score:0,flags:[]},org:'',org_clean:'',provider:{}}); }
    const pct=Math.round(((i+1)/ips.length)*100);
    fill.style.width=pct+'%';
    label.textContent=`Processing ${i+1} / ${ips.length}...`;
  }
  label.textContent=`Done &mdash; ${bulkResults.length} IPs processed`;
  btn.disabled=false; expBtn.disabled=false;
  renderBulkTable(bulkResults, resultEl);
}

function renderBulkTable(results, el) {
  const rows = results.map(r => {
    const det=r.detection||{}; const p=r.provider||{};
    const typeHtml = p.type?`<span class="tbadge ${providerBadgeClass(p.type)}" style="font-size:9px">${p.type}</span>`:'—';
    return `<tr>
      <td style="font-weight:500">${r.ip}</td>
      <td><span class="tbadge ${det.level||'low'}">${det.verdict||'—'}</span></td>
      <td>${det.score??'—'}</td>
      <td>${r.org_clean||r.org||'—'}</td>
      <td>${typeHtml}</td>
      <td>${r.country||'—'}</td>
      <td>${r.city||'—'}</td>
      <td style="color:var(--muted)">${(det.flags||[]).join(', ')||'—'}</td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>IP</th><th>Verdict</th><th>Score</th><th>Provider</th><th>Type</th><th>Country</th><th>City</th><th>Signals</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function clearBulk() {
  document.getElementById('bulkInput').value='';
  document.getElementById('bulk-result').innerHTML='';
  document.getElementById('bulkProgress').style.display='none';
  document.getElementById('exportBtn').disabled=true;
  bulkResults=[];
}

function exportCSV() {
  if(!bulkResults.length) return;
  const headers=['IP','Verdict','Risk Score','Level','Provider Type','Provider','ISP','Country','City','Timezone','Lat','Lon','Flags','MMDB','Website'];
  const rows=bulkResults.map(r=>{
    const det=r.detection||{}; const p=r.provider||{};
    return [r.ip,det.verdict,det.score,det.level,p.type||'',r.org_clean||r.org,r.isp,r.country,r.city,r.timezone,r.latitude,r.longitude,(det.flags||[]).join('; '),r.mmdb_available,p.website||'']
      .map(v=>`"${(v??'').toString().replace(/"/g,'""')}"`).join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='vpn_lookup_results.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── History ────────────────────────────────────────────────────────────────
function addToHistory(data) {
  const entry={...data,timestamp:new Date().toISOString()};
  history=[entry,...history.filter(h=>h.ip!==data.ip)].slice(0,200);
  localStorage.setItem('vpn_history2',JSON.stringify(history));
}
function renderHistory() {
  const el=document.getElementById('history-content');
  if(!history.length){ el.innerHTML='<div class="history-empty">No lookups yet.</div>'; return; }
  const rows=history.map(r=>{
    const det=r.detection||{}; const p=r.provider||{};
    const ts=new Date(r.timestamp).toLocaleString();
    const typeHtml=p.type?`<span class="tbadge ${providerBadgeClass(p.type)}" style="font-size:9px">${p.type}</span>`:'—';
    return `<tr>
      <td style="color:var(--muted);font-size:11px">${ts}</td>
      <td style="font-weight:500">${r.ip}</td>
      <td><span class="tbadge ${det.level||'low'}">${det.verdict||'—'}</span></td>
      <td>${det.score??'—'}</td>
      <td>${r.org_clean||r.org||'—'}</td>
      <td>${typeHtml}</td>
      <td>${r.country||'—'}</td>
      <td><span style="cursor:pointer;color:var(--accent2);font-size:11px" onclick="replayLookup('${r.ip}')">lookup &rarr;</span></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Time</th><th>IP</th><th>Verdict</th><th>Score</th><th>Provider</th><th>Type</th><th>Country</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function replayLookup(ip) { switchTab('single'); document.getElementById('ipInput').value=ip; singleLookup(ip); }
function clearHistory() { history=[]; localStorage.setItem('vpn_history2','[]'); renderHistory(); }
</script>
